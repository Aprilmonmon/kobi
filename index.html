<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摳比 KOBI - 你的夢想存錢小管家</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg-color: #FAF9F6; --primary-blue: #A2D2FF; --line-brown: #9E7E6B; --text-color: #6D5B4F; }
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        
        .kobi-container { width: 160px; height: 160px; background: #fff; border: 4px solid var(--line-brown); border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 10px 0; box-shadow: 0 8px 0px var(--primary-blue); overflow: hidden; cursor: pointer; }
        .kobi-container img { width: 80%; height: auto; }

        .balance-card { background: white; padding: 15px; border-radius: 20px; border: 2px solid var(--line-brown); text-align: center; width: 90%; max-width: 350px; margin-bottom: 15px; }
        .balance-amount { font-size: 28px; font-weight: bold; color: var(--primary-blue); }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 90%; max-width: 350px; }
        button { padding: 12px; border-radius: 12px; border: 2px solid var(--line-brown); font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-save { background-color: var(--primary-blue); color: white; }
        .btn-spend { background-color: white; color: var(--line-brown); }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 30px; border: 3px solid var(--line-brown); width: 85%; max-width: 320px; text-align: center; box-shadow: 0 10px 0 var(--line-brown); }
        
        .fortune-title { color: var(--primary-blue); font-size: 20px; font-weight: bold; margin-bottom: 15px; }
        .fortune-text { font-size: 17px; line-height: 1.6; color: var(--text-color); margin-bottom: 20px; white-space: pre-line; }
        
        select, input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 12px; border: 2px solid #eee; box-sizing: border-box; font-size: 16px; }
        .history-list { width: 90%; max-width: 350px; margin-top: 20px; background: white; border-radius: 15px; padding: 10px; border: 1px solid #eee; }
        .history-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #f9f9f9; font-size: 14px; align-items: center; }
        .item-save { color: #5dade2; } .item-spend { color: #9E7E6B; }
    </style>
</head>
<body>

    <div id="customModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">記帳囉</h3>
            <select id="categorySelect"></select>
            <input type="number" id="modalAmount" placeholder="金額">
            <input type="text" id="modalNote" placeholder="備註（選填）">
            <div style="display:flex; gap:10px;">
                <button onclick="closeModal()" style="flex:1;">取消</button>
                <button onclick="confirmEntry()" style="flex:1; background:var(--primary-blue); color:white;">確定</button>
            </div>
        </div>
    </div>

    <div id="fortuneModal" class="modal">
        <div class="modal-content">
            <div id="fortuneTitle" class="fortune-title">🌟 摳比開示 🌟</div>
            <div id="fortuneText" class="fortune-text"></div>
            <button onclick="closeFortune()" style="width:100%; background:var(--primary-blue); color:white; border:none; padding:12px; border-radius:15px; font-weight:bold;">收下好運 ✨</button>
        </div>
    </div>

    <div class="kobi-container" onclick="showKobiFortune()">
        <img src="kobi-logo.png" alt="KOBI">
    </div>

    <div class="balance-card">
        <div id="totalBalanceText">目前摳比餘額</div>
        <div class="balance-amount" id="totalBalance">$0</div>
    </div>

    <div class="btn-group">
        <button class="btn-save" onclick="openModal('save')">收入</button>
        <button class="btn-spend" onclick="openModal('spend')">支出</button>
    </div>

    <canvas id="myChart"></canvas>

    <div class="history-list" id="historyList">
        <div style="font-weight:bold; margin-bottom:5px;">最近紀錄</div>
    </div>

        "存錢筒說它肚子餓了，快餵它吃一點閃亮的銅板。🪙\n🌈 幸運色：古銅色",

        "惜物就是最大的福氣，省下的錢會變成喜歡的樣子。♻️\n🌈 幸運色：湖水綠",
        "累的時候看一眼進度條，夢想的動力就回來了！🚀\n🌈 幸運色：星空銀",
        "相信自己的分析與紀錄，不盲從就是最好的投資。🛡️\n🌈 幸運色：鋼鐵灰",
        "你值得美好生活，這一切從學會管錢開始。🥂\n🌈 幸運色：香檳金",

        "不管世界怎麼變，摳比永遠在手機裡支持你！🐹\n🌈 幸運色：摳比藍",
        "今日宜閱讀，文字的力量會帶給你新的商機。📖\n🌈 幸運色：經典黑",
        "好運就像公車，錯過這班，下一班會載你去更遠的地方。🚌\n🌈 幸運色：亮黃色",
        "你是最棒的，今天的你比昨天更懂如何創造財富。🥇\n🌈 幸運色：榮耀金"
    ];

    function showKobiFortune() {
        const randomIndex = Math.floor(Math.random() * kobiFortunes.length);
        document.getElementById('fortuneTitle').innerText = "🌟 摳比今日財運開示 🌟";
        document.getElementById('fortuneText').innerText = kobiFortunes[randomIndex];
        document.getElementById('fortuneModal').style.display = 'flex';
    }

    function showKobiDream() {
        document.getElementById('fortuneTitle').innerText = "☁️ 夢想摳摳摳 ☁️";
        document.getElementById('fortuneText').innerText = "一步一步慢慢來，摳比會陪你存到目標金額的！加油！💪";
        document.getElementById('fortuneModal').style.display = 'flex';
    }

    function closeFortune() { document.getElementById('fortuneModal').style.display = 'none'; }

    async function initLiff() {
        try {
            await liff.init({ liffId: "2010068096-vsSIzIqA" });
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                const profile = await liff.getProfile();
                document.getElementById('totalBalanceText').innerText = `${profile.displayName} 的摳比餘額`;
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.get('draw') === '1') showKobiFortune();
                else if (urlParams.get('dream') === '1') showKobiDream();
            }
        } catch (error) { console.error("LIFF 失敗", error); }
        updateUI();
    }

    function loadData() {
        try {
            let saved = localStorage.getItem('kobiRecords');
            return saved ? JSON.parse(saved) : [];
        } catch (e) { return []; }
    }

    let categories = {
        save: ["薪水", "投資高手", "發獎金啦", "其他"],
        spend: ["吃喝費", "治裝費", "交通費", "網路手機費用", "玩耍費用", "金融保險費", "學習上進費", "醫療費用", "其他"]
    };

    let kobiRecords = loadData();
    let currentType = '';

    initLiff();

    function openModal(type) {
        currentType = type;
        document.getElementById('modalTitle').innerText = (type === 'save' ? "增加收入" : "支出項目");
        const select = document.getElementById('categorySelect');
        select.innerHTML = categories[type].map(cat => `<option value="${cat}">${cat}</option>`).join('');
        document.getElementById('modalAmount').value = '';
        document.getElementById('modalNote').value = '';
        document.getElementById('customModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('customModal').style.display = 'none'; }

    function confirmEntry() {
        const amount = parseInt(document.getElementById('modalAmount').value);
        if (amount > 0) {
            kobiRecords.unshift({
                id: Date.now(), 
                type: currentType,
                category: document.getElementById('categorySelect').value,
                amount: amount,
                note: document.getElementById('modalNote').value || "",
                date: new Date().toLocaleDateString()
            }); 
            saveAndUpdate();
            closeModal();
        }
    }

    function deleteRecord(id) {
        if (confirm("確定要刪除嗎？")) {
            kobiRecords = kobiRecords.filter(r => r.id !== id);
            saveAndUpdate();
        }
    }

    function saveAndUpdate() {
        localStorage.setItem('kobiRecords', JSON.stringify(kobiRecords));
        updateUI();
    }

    function updateUI() {
        let totalSave = 0, totalSpend = 0;
        const list = document.getElementById('historyList');
        list.innerHTML = '<div style="font-weight:bold; margin-bottom:5px;">最近紀錄</div>';

        kobiRecords.forEach(r => {
            if(r.type === 'save') totalSave += r.amount;
            else totalSpend += r.amount;
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `
                <span style="flex:1"><b class="item-${r.type}">${r.category}</b> <small style="color:#999;">${r.note}</small></span>
                <span class="item-${r.type}" style="margin-right:10px;">${r.type==='save'?'+':'-'}${r.amount}</span>
                <span onclick="deleteRecord(${r.id})" style="cursor:pointer; color:#ccc;">✕</span>
            `;
            list.appendChild(item);
        });
        document.getElementById('totalBalance').innerText = `$${totalSave - totalSpend}`;
        renderChart(totalSave, totalSpend);
    }

    let myChart;
    function renderChart(s, p) {
        const ctx = document.getElementById('myChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['收入', '支出'],
                datasets: [{ data: [s, p], backgroundColor: ['#A2D2FF', '#9E7E6B'], borderWidth: 0 }]
            },
            options: { cutout: '75%' }
        });
    }
</script>
</body>
</html>
