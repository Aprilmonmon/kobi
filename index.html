<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>樞比 KOBI - 夢想金庫</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg-color: #FAF9F6; --primary-blue: #A2D2FF; --line-brown: #9E7E6B; --text-color: #6D5B4F; }
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .tab-group { display: flex; width: 100%; background: white; border-bottom: 2px solid var(--line-brown); position: sticky; top: 0; z-index: 100; }
        .tab-btn { flex: 1; padding: 15px; text-align: center; font-weight: bold; cursor: pointer; border: none; background: none; color: #ccc; }
        .tab-btn.active { color: var(--line-brown); border-bottom: 4px solid var(--line-brown); }
        .page { display: none; width: 90%; max-width: 350px; padding: 20px 0; flex-direction: column; align-items: center; }
        .page.active { display: flex; }
        .kobi-container { width: 120px; height: 120px; background: #fff; border: 4px solid var(--line-brown); border-radius: 50%; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; box-shadow: 0 6px 0px var(--primary-blue); cursor: pointer; }
        .kobi-container img { width: 80%; }
        .balance-card { background: white; padding: 15px; border-radius: 20px; border: 2px solid var(--line-brown); text-align: center; width: 100%; margin-bottom: 15px; }
        .balance-amount { font-size: 28px; font-weight: bold; color: var(--primary-blue); }
        .dream-card { background: white; border-radius: 15px; padding: 15px; width: 100%; border: 1px solid #ddd; margin-bottom: 12px; box-sizing: border-box; }
        .progress-bar { background: #eee; height: 12px; border-radius: 6px; margin: 10px 0; overflow: hidden; }
        .progress-fill { background: var(--primary-blue); height: 100%; transition: 0.5s; width: 0%; }
        .reward-link { display: none; color: white; background: var(--primary-blue); font-size: 13px; font-weight: bold; text-decoration: none; margin-top: 10px; padding: 10px; border-radius: 8px; text-align: center; border: none; width: 100%; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 30px; width: 85%; max-width: 320px; text-align: center; }
        input, select { width: 90%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; }
        .btn-main { width: 100%; padding: 12px; border-radius: 12px; border: none; background: var(--primary-blue); color: white; font-weight: bold; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="tab-group">
        <div class="tab-btn active" onclick="switchPage('recordPage', this)">樞比記帳</div>
        <div class="tab-btn" onclick="switchPage('dreamPage', this)">夢想福利社</div>
    </div>

    <div id="recordPage" class="page active">
        <div class="kobi-container" onclick="showFortune()">
            <img src="kobi-logo.png" alt="KOBI">
        </div>
        <div class="balance-card">
            <div style="font-size:14px; color:#999;">目前可分配餘額</div>
            <div class="balance-amount" id="mainBalance">$0</div>
        </div>
        <div style="display: flex; gap: 10px; width: 100%;">
            <button onclick="openRecordModal('save')" style="flex:1; padding:12px; background:var(--primary-blue); color:white; border-radius:12px; border:none; font-weight:bold;">收入</button>
            <button onclick="openRecordModal('spend')" style="flex:1; padding:12px; background:white; border:2px solid var(--line-brown); border-radius:12px; font-weight:bold;">支出</button>
        </div>
        <canvas id="myChart" style="margin-top:20px; max-height: 200px;"></canvas>
    </div>

    <div id="dreamPage" class="page">
        <div style="width:100%; display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <b style="font-size:18px;">☁️ 夢想清單</b>
            <button onclick="document.getElementById('dreamModal').style.display='flex'" style="background:var(--line-brown); color:white; border:none; padding:8px 12px; border-radius:8px; font-size:12px;">+ 新增目標</button>
        </div>
        <div id="dreamContainer" style="width:100%;"></div>
        <hr style="width:100%; border:0; border-top:1px solid #ddd; margin:20px 0;">
        <b style="font-size:18px; width:100%; text-align:left;">🎁 犒賞福利社</b>
        <div style="font-size:12px; color:#999; margin-bottom:10px; width:100%;">達標後即可解鎖專屬優惠！</div>
        <div id="shopList" style="width:100%;">
            <div class="dream-card" style="border-style: dashed; border-color: var(--primary-blue);">
                <b>Gorpcore 機能登山鞋</b>
                <div style="font-size:12px; color:#999; margin-top:5px;">解鎖門檻: $4,500</div>
                <button id="reward-機能登山鞋" class="reward-link" onclick="window.open('https://www.merrell.com.tw/')">🎉 犒賞時間！前往領取福利</button>
            </div>
            <div class="dream-card" style="border-style: dashed; border-color: var(--primary-blue);">
                <b>正米色厚磅棉 Tee</b>
                <div style="font-size:12px; color:#999; margin-top:5px;">解鎖門檻: $1,280</div>
                <button id="reward-米色Tee" class="reward-link" onclick="window.open('https://shopee.tw/')">🎉 已達標！點我前往購買</button>
            </div>
        </div>
    </div>

    <!-- 彈窗區 -->
    <div id="recordModal" class="modal"><div class="modal-content">
        <h3 id="modalTitle">新增紀錄</h3>
        <select id="categorySelect">
            <option value="生活開銷">生活開銷</option>
            <option value="創業收入">創業收入</option>
            <option value="股票獲利">股票獲利</option>
        </select>
        <input type="number" id="amountInput" placeholder="輸入金額" inputmode="numeric">
        <button class="btn-main" onclick="addRecord()">確認</button>
        <button onclick="closeModal('recordModal')" style="width:100%; background:none; border:none; margin-top:10px; color:#999;">取消</button>
    </div></div>

    <div id="dreamModal" class="modal"><div class="modal-content">
        <h3>設定夢想目標</h3>
        <input type="text" id="dreamName" placeholder="例如: 機能登山鞋">
        <input type="number" id="dreamTarget" placeholder="目標金額">
        <button class="btn-main" onclick="addDream()">開始存錢！</button>
        <button onclick="closeModal('dreamModal')" style="width:100%; background:none; border:none; margin-top:10px; color:#999;">取消</button>
    </div></div>

    <div id="fortuneModal" class="modal"><div class="modal-content">
        <div style="color:var(--primary-blue); font-weight:bold; margin-bottom:10px;">🌟 樞比今日開示 🌟</div>
        <div id="fortuneText" style="line-height:1.6; margin-bottom:15px; white-space:pre-line; text-align: left; font-size: 14px;"></div>
        <button onclick="closeModal('fortuneModal')" style="width:100%; background:var(--primary-blue); color:white; border:none; border-radius:15px; padding:12px; font-weight:bold;">收下好運</button>
    </div></div>

    <script>
        const kobiFortunes = [
            "財神爺今天住你家，別忘了幫祂準備下午茶！☕\n🌈 幸運色：暖陽黃",
            "今日財運爆棚，穿漂亮一點，錢財自然跟上。✨\n🌈 幸運色：優雅正米色",
            "不管世界怎麼變，摳比永遠在手機裡支持你！🐹\n🌈 幸運色：摳比藍",
            "小錢不入，大錢不來。今天的你適合存下一張百鈔。💰\n🌈 幸運色：薄荷綠",
            "夢想不是用想的，是靠你一筆一筆記下來的。📈\n🌈 幸運色：經典白",
            "今日宜：對自己好一點。買杯咖啡也是種創業投資。☕\n🌈 幸運色：拿鐵棕",
            "錢包像呼吸，有出才有入，別太緊繃。🌬️\n🌈 幸運色：天空藍",
            "今天的你閃閃發光，適合處理延宕已久的帳單。⚡\n🌈 幸運色：亮銀色",
            "好事正在發生，只是它走得比較慢，耐心點。🚶\n🌈 幸運色：森林綠",
            "創業之路不孤單，摳比陪你算好每一分錢。🐹\n🌈 幸運色：暖心橘",
            "適合與夥伴討論未來，今天的直覺很準。💡\n🌈 幸運色：神秘紫",
            "理財就是理生活。今天把收據整理一下吧！📄\n🌈 幸運色：簡約灰",
            "你努力的樣子很美，連錢幣都想跳進你的口袋。💃\n🌈 幸運色：玫瑰粉",
            "今日宜：深呼吸。創業的焦慮會隨風而去。🍃\n🌈 幸運色：清新綠",
            "錢不是消失了，是變成你喜歡的樣子留下來。👗\n🌈 幸運色：象牙白",
            "保持好奇心，今天可能會有意想不到的小偏財。🎁\n🌈 幸運色：亮橘色",
            "穩定進步就是最大的捷徑。一步一步來。🐢\n🌈 幸運色：深藍色",
            "今天的你，比昨天的你更富有，不管是錢還是經驗。🌟\n🌈 幸運色：琥珀色",
            "投資自己永遠是報酬率最高的項目。📚\n🌈 幸運色：文青綠",
            "適合清理不需要的開銷，輕裝上陣。🎒\n🌈 幸運色：卡其色",
            "生活有苦有甜，記帳有進有出，這就是人生。🍭\n🌈 幸運色：珊瑚紅",
            "今天的財運像太陽一樣耀眼，記得微笑。😊\n🌈 幸運色：金黃色",
            "適合低調行事，悄悄地累積財富。🤫\n🌈 幸運色：碳黑色",
            "給自己一個讚，你已經做得很棒了。👍\n🌈 幸運色：翠綠色",
            "財富是給有準備的人。你準備好了嗎？🔥\n🌈 幸運色：烈焰紅",
            "今天適合去戶外走走，機能穿搭能帶來好運。🏔️\n🌈 幸運色：岩石灰",
            "別盯著數字看，去看看遠方的目標。🔭\n🌈 幸運色：海軍藍",
            "每一筆支出都是在為你想要的未來投票。🗳️\n🌈 幸運色：粉紫色",
            "今天的開示：少喝一杯珍奶，夢想進度快 1%。🧋\n🌈 幸運色：奶茶色",
            "你的眼光獨特，今天的選物感很強，適合尋寶。💎\n🌈 幸運色：青銅色",
            "財富感來自內心的富足。今天吃頓好吃的吧！🍷\n🌈 幸運色：酒紅色",
            "適合處理稅務或保險相關的事宜，理清頭緒。📁\n🌈 幸運色：湖水綠",
            "你是自己生命的主理人，記帳只是管理工具。👑\n🌈 幸運色：皇家藍",
            "今天可能會有貴人相助，記得多說謝謝。🤝\n🌈 幸運色：淺黃色",
            "夢想清單又多一項？沒關係，努力賺回來！🛒\n🌈 幸運色：丁香紫",
            "今天適合檢視你的股息或被動收入，讓錢幫你工作。💰\n🌈 幸運色：翡翠綠",
            "不要怕麻煩，麻煩的事情通常最賺錢。🛠️\n🌈 幸運色：土黃色",
            "適度的放空能讓大腦更清醒，更有賺錢點子。🧘\n🌈 幸運色：透明色",
            "今天的你能量滿滿，適合談判或簽約。✒️\n🌈 幸運色：墨綠色",
            "記得領取你的專屬福利，摳比會幫你留意優惠。🎁\n🌈 幸運色：桃紅色",
            "把錢花在刀口上，把愛留給重要的人。❤️\n🌈 幸運色：淺粉色",
            "今日宜：勇敢一點。新的商業機會就在門外。🚪\n🌈 幸運色：寶藍色",
            "生活要有儀式感，記帳也可以很優雅。🕯️\n🌈 幸運色：正米色",
            "今天的財位在東方，沒事往東邊走走。🚩\n🌈 幸運色：亮紫色",
            "保持彈性，計畫趕不上變化時就隨機應變。🧶\n🌈 幸運色：米白色",
            "創業就是不斷地解決問題。你今天解決了嗎？🔧\n🌈 幸運色：咖啡色",
            "適合與老友聚會，資訊交換可能帶來財路。📞\n🌈 幸運色：橄欖綠",
            "聽聽音樂，放鬆心情。好的情緒能吸引好的財運。🎵\n🌈 幸運色：靛藍色",
            "今天的你有如神助，想做的企劃趕快寫下來。📝\n🌈 幸運色：檸檬黃",
            "最後一則開示：相信你自己。樞比相信你一定做得到。🐹\n🌈 幸運色：摳比藍"
        ];

        let records = JSON.parse(localStorage.getItem('kobiRecords') || '[]');
        let dreams = JSON.parse(localStorage.getItem('kobiDreams') || '[]');
        let currentRecordType = 'save';
        let chart;

        async function initLiff() {
            try {
                await liff.init({ liffId: "2010068096-vsSIzIqA" });
                if (!liff.isLoggedIn()) { liff.login(); }
                updateBalance();
            } catch (e) { console.log('LIFF Init Error', e); updateBalance(); }
        }

        function switchPage(pageId, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            btn.classList.add('active');
            if(pageId === 'dreamPage') renderDreams();
        }

        function openRecordModal(type) {
            currentRecordType = type;
            document.getElementById('modalTitle').innerText = type === 'save' ? '新增收入' : '新增支出';
            document.getElementById('recordModal').style.display = 'flex';
        }

        function addRecord() {
            const amt = parseInt(document.getElementById('amountInput').value);
            if(!amt) return;
            records.push({ type: currentRecordType, amount: amt, date: new Date() });
            localStorage.setItem('kobiRecords', JSON.stringify(records));
            closeModal('recordModal');
            document.getElementById('amountInput').value = '';
            updateBalance();
        }

        function addDream() {
            const name = document.getElementById('dreamName').value;
            const target = parseInt(document.getElementById('dreamTarget').value);
            if(!name || !target) return;
            dreams.push({ name, target });
            localStorage.setItem('kobiDreams', JSON.stringify(dreams));
            closeModal('dreamModal');
            document.getElementById('dreamName').value = '';
            document.getElementById('dreamTarget').value = '';
            renderDreams();
        }

        function updateBalance() {
            const total = records.reduce((acc, r) => r.type === 'save' ? acc + r.amount : acc - r.amount, 0);
            document.getElementById('mainBalance').innerText = `$${total.toLocaleString()}`;
            renderChart();
            return total;
        }

        function renderDreams() {
            const total = updateBalance();
            const container = document.getElementById('dreamContainer');
            container.innerHTML = '';
            dreams.forEach(d => {
                const percent = Math.min(Math.floor((total / d.target) * 100), 100);
                const isDone = percent >= 100;
                container.innerHTML += `
                    <div class="dream-card">
                        <b>${d.name}</b>
                        <div style="font-size:18px; margin:5px 0;">$${d.target.toLocaleString()}</div>
                        <div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div>
                        <div style="font-size:12px; color:#888;">${isDone ? '🎉 夢想達成！' : '還差 $' + (d.target - total).toLocaleString()}</div>
                    </div>
                `;
                const rewardBtn = document.getElementById('reward-' + d.name);
                if(rewardBtn) { rewardBtn.style.display = isDone ? 'block' : 'none'; }
            });
        }

        function showFortune() {
            const randomIndex = Math.floor(Math.random() * kobiFortunes.length);
            document.getElementById('fortuneText').innerText = kobiFortunes[randomIndex];
            document.getElementById('fortuneModal').style.display = 'flex';
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function renderChart() {
            const s = records.filter(r => r.type === 'save').reduce((a, b) => a + b.amount, 0);
            const p = records.filter(r => r.type === 'spend').reduce((a, b) => a + b.amount, 0);
            const ctx = document.getElementById('myChart').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels:['收入','支出'], datasets:[{data:[s||1, p], backgroundColor:['#A2D2FF','#9E7E6B'], borderWidth: 0}]},
                options: { cutout: '80%', plugins: { legend: { display: false } } }
            });
        }

        initLiff();
    </script>
</body>
</html>
