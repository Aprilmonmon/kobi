<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>樞比 KOBI - 夢想金庫</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg-color: #FAF9F6; --primary-blue: #A2D2FF; --line-brown: #9E7E6B; --text-color: #6D5B4F; }
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .tab-group { display: flex; width: 100%; background: white; border-bottom: 2px solid var(--line-brown); position: sticky; top: 0; z-index: 1000; }
        .tab-btn { flex: 1; padding: 18px 10px; text-align: center; font-weight: bold; cursor: pointer; border: none; background: none; color: #ccc; font-size: 16px; }
        .tab-btn.active { color: var(--line-brown); border-bottom: 4px solid var(--line-brown); }
        .page { display: none; width: 90%; max-width: 350px; padding: 20px 0; flex-direction: column; align-items: center; }
        .page.active { display: flex !important; }
        .kobi-container { width: 130px; height: 130px; background: #fff; border: 4px solid var(--line-brown); border-radius: 50%; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; box-shadow: 0 6px 0px var(--primary-blue); cursor: pointer; }
        .kobi-container img { width: 85%; }
        .balance-card { background: white; padding: 15px; border-radius: 20px; border: 2px solid var(--line-brown); text-align: center; width: 100%; margin-bottom: 20px; box-sizing: border-box; }
        .balance-amount { font-size: 32px; font-weight: bold; color: var(--primary-blue); }
        .dream-card { background: white; border-radius: 15px; padding: 15px; width: 100%; border: 1px solid #ddd; margin-bottom: 12px; }
        .progress-bar { background: #eee; height: 14px; border-radius: 7px; margin: 12px 0; overflow: hidden; }
        .progress-fill { background: var(--primary-blue); height: 100%; width: 0%; transition: 0.8s; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.65); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 30px; width: 85%; max-width: 320px; text-align: center; }
        .btn-main { width: 100%; padding: 14px; border-radius: 14px; border: none; background: var(--primary-blue); color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="tab-group">
        <div id="btn-record" class="tab-btn active" onclick="switchPage('recordPage', this)">樞比記帳</div>
        <div id="btn-dream" class="tab-btn" onclick="switchPage('dreamPage', this)">夢想福利社</div>
    </div>

    <div id="recordPage" class="page active">
        <div class="kobi-container" onclick="showFortune()">
            <img src="kobi-logo.png" alt="KOBI">
        </div>
        <div class="balance-card">
            <div style="font-size:14px; color:#999;">目前可分配餘額</div>
            <div class="balance-amount" id="mainBalance">$0</div>
        </div>
        <div style="display: flex; gap: 10px; width: 100%;">
            <button onclick="openRecordModal('save')" style="flex:1; padding:15px; background:var(--primary-blue); color:white; border-radius:15px; border:none; font-weight:bold;">收入</button>
            <button onclick="openRecordModal('spend')" style="flex:1; padding:15px; background:white; border:2px solid var(--line-brown); border-radius:15px; font-weight:bold;">支出</button>
        </div>
        <canvas id="myChart" style="margin-top:25px; max-height: 180px;"></canvas>
    </div>

    <div id="dreamPage" class="page">
        <div style="width:100%; display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <b style="font-size:20px;">☁️ 夢想清單</b>
            <button onclick="document.getElementById('dreamModal').style.display='flex'" style="background:var(--line-brown); color:white; border:none; padding:8px 15px; border-radius:10px;">+ 新增目標</button>
        </div>
        <div id="dreamContainer" style="width:100%;"></div>
    </div>

    <div id="fortuneModal" class="modal"><div class="modal-content">
        <div style="color:var(--primary-blue); font-weight:bold; margin-bottom:10px;">🐹 樞比今日開示 🐹</div>
        <div id="fortuneText" style="line-height:1.7; margin:15px 0; white-space:pre-line; text-align: left; font-size: 15px;"></div>
        <button onclick="closeModal('fortuneModal')" class="btn-main">收下這份好運</button>
    </div></div>

    <script>
        // 為了節省篇幅，這裏只放三則，請你自己把之前那 50 則補在 [ ] 裡面喔！
        const kobiFortunes = [
            "財神爺今天住你家，別忘了幫祂準備下午茶！☕\n🌈 幸運色：暖陽黃",
            "今日財運爆棚，穿漂亮一點，錢財自然跟上。✨\n🌈 幸運色：優雅正米色",
            "不管世界怎麼變，樞比永遠在手機裡支持你！🐹\n🌈 幸運色：樞比藍"
        ];

        let records = JSON.parse(localStorage.getItem('kobiRecords') || '[]');
        let dreams = JSON.parse(localStorage.getItem('kobiDreams') || '[]');
        let chart;

        // 🟢 修改點：讓頁面一加載就檢查參數，不要等 LIFF
function checkParams() {
    const params = new URLSearchParams(window.location.search);
    
    // 處理夢想分頁跳轉
    if (params.get('dream') === '1') {
        const btn = document.getElementById('btn-dream');
        if (btn) switchPage('dreamPage', btn);
    } 
    
    // 處理籤詩彈窗：加入 500 毫秒延遲，確保畫面準備好了
    if (params.get('draw') === '1') {
        setTimeout(() => {
            showFortune();
        }, 500);
    }
}


        async function initLiff() {
            try {
                await liff.init({ liffId: "2010068096-vsSIzIqA" });
                if (!liff.isLoggedIn()) { liff.login(); }
            } catch (e) { console.log('LIFF Error'); }
            updateUI();
        }

        function switchPage(pageId, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            btn.classList.add('active');
            if(pageId === 'dreamPage') renderDreams();
        }

        function showFortune() {
            const randomIndex = Math.floor(Math.random() * kobiFortunes.length);
            document.getElementById('fortuneText').innerText = kobiFortunes[randomIndex];
            document.getElementById('fortuneModal').style.display = 'flex';
        }

        function updateUI() {
            const total = records.reduce((acc, r) => r.type === 'save' ? acc + r.amount : acc - r.amount, 0);
            document.getElementById('mainBalance').innerText = `$${total.toLocaleString()}`;
            renderChart();
        }

        function renderDreams() {
            const total = records.reduce((acc, r) => r.type === 'save' ? acc + r.amount : acc - r.amount, 0);
            const container = document.getElementById('dreamContainer');
            container.innerHTML = '';
            dreams.forEach(d => {
                const percent = Math.min(Math.floor((total / d.target) * 100), 100);
                container.innerHTML += `
                    <div class="dream-card">
                        <b>${d.name}</b>
                        <div style="font-size:20px; margin:8px 0; color:var(--line-brown);">$${d.target.toLocaleString()}</div>
                        <div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div>
                    </div>`;
            });
        }

        function renderChart() {
            const s = records.filter(r => r.type === 'save').reduce((a, b) => a + b.amount, 0);
            const p = records.filter(r => r.type === 'spend').reduce((a, b) => a + b.amount, 0);
            const ctx = document.getElementById('myChart').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels:['收入','支出'], datasets:[{data:[s||1, p], backgroundColor:['#A2D2FF','#9E7E6B'], borderWidth: 0}]},
                options: { cutout: '80%', plugins: { legend: { display: false } } }
            });
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // 啟動順序：先檢查參數跳轉，再啟動 LIFF
        window.onload = () => {
            checkParams();
            initLiff();
        };
    </script>
</body>
</html>
