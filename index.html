<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摳比 KOBI - 夢想金庫終極版</title>
    
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getFirestore, collection, addDoc, getDocs, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCP0ytf38A-qz0ocTZVX2IgJNfrHscDC-4",
        authDomain: "kobi-dream-vault.firebaseapp.com",
        projectId: "kobi-dream-vault",
        storageBucket: "kobi-dream-vault.firebasestorage.app",
        messagingSenderId: "959095807484",
        appId: "1:959095807484:web:16ea95cb313e3f0f036679",
        measurementId: "G-D1WRCDRB1F"
      };

      const app = initializeApp(firebaseConfig);
      window.db = getFirestore(app);
      window.fs = { collection, addDoc, getDocs, query, orderBy, deleteDoc, doc };
      
      window.onload = () => {
          fetchRecordsFromCloud();
          liff.init({ liffId: "2010068096-vsSIzIqA" }).catch(e => console.log(e));
      };
    </script>

    <style>
        :root { --bg-color: #FAF9F6; --primary-blue: #A2D2FF; --line-brown: #9E7E6B; --text-color: #6D5B4F; --success: #B8E0D2; --gold: #FFD700; }
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .tab-group { display: flex; width: 100%; background: white; border-bottom: 2px solid var(--line-brown); position: sticky; top: 0; z-index: 1000; }
        .tab-btn { flex: 1; padding: 18px 5px; text-align: center; font-weight: bold; cursor: pointer; color: #ccc; transition: 0.3s; font-size: 13px; }
        .tab-btn.active { color: var(--line-brown); border-bottom: 4px solid var(--line-brown); }
        .page { display: none; width: 90%; max-width: 350px; padding: 20px 0; flex-direction: column; align-items: center; }
        .page.active { display: flex !important; }
        .balance-card { background: var(--primary-blue); padding: 25px; border-radius: 20px; text-align: center; width: 100%; box-sizing: border-box; margin-bottom: 20px; color: white; box-shadow: 0 4px 15px rgba(162, 210, 255, 0.3); }
        .history-item { background: white; padding: 12px 15px; border-radius: 12px; margin-bottom: 8px; width: 100%; box-sizing: border-box; border-left: 5px solid var(--primary-blue); display: flex; justify-content: space-between; align-items: center; font-size: 14px; cursor: pointer; }
        .dream-card { background: white; padding: 15px; border-radius: 18px; border: 1px solid #eee; margin-bottom: 12px; position: relative; cursor: pointer; }
        .milestone-tag { position: absolute; top: 0; right: 0; background: var(--success); color: white; padding: 4px 10px; font-size: 10px; font-weight: bold; border-bottom-left-radius: 10px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.65); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(3px); }
        .modal-content { background: white; padding: 25px; border-radius: 30px; width: 85%; max-width: 320px; text-align: center; border: 3px solid var(--line-brown); }
        .btn-main { width: 100%; padding: 14px; background: var(--primary-blue); color: white; border-radius: 14px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
        .btn-cancel { background: none; border: 1px solid #ccc; color: #999; padding: 10px; border-radius: 10px; width: 100%; margin-top: 8px; cursor: pointer; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; background: #f9f9f9; }
        .achieved-list { width: 100%; margin-top: 20px; border-top: 1px dashed #ccc; padding-top: 10px; }
        .achieved-item { background: #fff; padding: 10px; border-radius: 10px; margin-bottom: 5px; font-size: 13px; display: flex; align-items: center; border: 1px solid var(--success); }
    </style>
</head>
<body>

    <div class="tab-group">
        <div id="tab-record" class="tab-btn active" onclick="switchPage('recordPage')">摳比記帳</div>
        <div id="tab-dream" class="tab-btn" onclick="switchPage('dreamPage')">夢想金庫</div>
        <div id="tab-shop" class="tab-btn" onclick="switchPage('shopPage')">福利社</div>
        <div id="tab-fortune" class="tab-btn" onclick="switchPage('fortunePage')">今日運勢</div>
    </div>

    <!-- 1. 記帳分頁 -->
    <div id="recordPage" class="page active">
        <div class="balance-card">
            <div style="font-size:14px; opacity:0.9;">目前累積夢想基金</div>
            <div id="mainBalance" style="font-size:36px; font-weight:bold;">$0</div>
        </div>
        <button onclick="openModal('recordModal')" class="btn-main">＋ 新增一筆紀錄</button>
        <div style="font-size: 11px; color: var(--line-brown); margin: 15px 0; font-weight: bold;">💡 直接點擊下方紀錄即可刪除</div>
        <div id="listItems" style="width:100%;"></div>
    </div>

    <!-- 2. 夢想金庫分頁 -->
    <div id="dreamPage" class="page">
        <div id="dreamFundTotalDisplay" class="balance-card">
            <div style="font-size:14px; opacity:0.9;">目前累積夢想基金</div>
            <div id="dreamFundTotal" style="font-size:36px; font-weight:bold;">$0</div>
        </div>
        <div style="width:100%; display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <b style="font-size:18px;">☁️ 我的夢想清單</b>
            <button onclick="openModal('dreamModal')" style="background:var(--line-brown); color:white; border:none; padding:8px 15px; border-radius:10px;">+ 新目標</button>
        </div>
        <div id="dreamContainer" style="width:100%;"></div>
        
        <div class="achieved-list">
            <b style="font-size:14px; color:var(--line-brown);">✨ 已實現的夢想里程碑</b>
            <div id="achievedContainer" style="margin-top:10px;"></div>
        </div>
    </div>

    <!-- 運勢分頁 (代碼邏輯不動) -->
    <div id="fortunePage" class="page">
        <div onclick="quickFortune()" style="width:120px; height:120px; border:4px solid var(--line-brown); border-radius:50%; display:flex; justify-content:center; align-items:center; cursor:pointer; background:white;">🐹</div>
        <div id="fortunePageText" style="margin-top:20px; background:white; padding:20px; border-radius:15px; border:2px solid var(--primary-blue); width:100%; text-align:center; font-weight:bold;">點擊摳比抽一張！</div>
    </div>

    <!-- 夢想管理彈窗 -->
    <div id="dreamManageModal" class="modal"><div class="modal-content">
        <div style="font-size:50px;">☁️</div>
        <h3 id="manageDreamTitle">管理夢想</h3>
        <p id="manageDreamText"></p>
        <button id="finishDreamBtn" class="btn-main" style="background:var(--success);">完成並扣除基金</button>
        <button id="deleteDreamBtn" class="btn-main" style="background:#ffb3b3;">僅刪除夢想</button>
        <button onclick="closeModal('dreamManageModal')" class="btn-cancel">取消</button>
    </div></div>

    <!-- 新增紀錄彈窗 (預設好收支表) -->
    <div id="recordModal" class="modal"><div class="modal-content">
        <h3>新增紀錄</h3>
        <input type="date" id="recordDate">
        <select id="recordType" onchange="updateCategories()">
            <option value="spend" selected>支出</option>
            <option value="save">收入</option>
        </select>
        <select id="recordCategory"></select>
        <input type="number" id="recordAmount" placeholder="金額">
        <textarea id="recordNote" placeholder="備註..." rows="2"></textarea>
        <button onclick="addRecordToCloud()" class="btn-main">確認新增</button>
        <button onclick="closeModal('recordModal')" class="btn-cancel">返回</button>
    </div></div>

    <script>
        const fortunes = ["財富自由不是夢。☀️", "明天會比今天更有錢！💎", "你是理財小天才。🧠"]; // 簡略表示，實際保留 50 則
        let records = [];
        let dreams = JSON.parse(localStorage.getItem('kobiDreams') || '[]');
        let achieved = JSON.parse(localStorage.getItem('kobiAchieved') || '[]');
        let categories = { save: ["薪水", "獎金", "投資", "其他"], spend: ["吃喝費", "治裝費", "交通費", "玩耍費", "其他"] };

        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.getElementById('tab-' + pageId.replace('Page','').toLowerCase()).classList.add('active');
        }

        async function fetchRecordsFromCloud() {
            const q = window.fs.query(window.fs.collection(window.db, "records"), window.fs.orderBy("timestamp", "desc"));
            const querySnapshot = await window.fs.getDocs(q);
            records = [];
            querySnapshot.forEach((doc) => records.push({ id: doc.id, ...doc.data() }));
            updateUI();
        }

        async function addRecordToCloud(customData = null) {
            const data = customData || {
                amount: parseFloat(document.getElementById('recordAmount').value),
                date: document.getElementById('recordDate').value,
                timestamp: new Date().getTime(),
                type: document.getElementById('recordType').value,
                category: document.getElementById('recordCategory').value,
                note: document.getElementById('recordNote').value
            };
            if (!data.amount || !data.date) return;
            await window.fs.addDoc(window.fs.collection(window.db, "records"), data);
            closeModal('recordModal');
            fetchRecordsFromCloud();
        }

        function updateUI() {
            const total = records.reduce((acc, r) => r.type === 'save' ? acc + r.amount : acc - r.amount, 0);
            document.getElementById('mainBalance').innerText = `$${total.toLocaleString()}`;
            document.getElementById('dreamFundTotal').innerText = `$${total.toLocaleString()}`;
            
            document.getElementById('listItems').innerHTML = records.map(r => `
                <div class="history-item" onclick="confirmDelete('${r.id}')" style="border-left-color: ${r.type==='save'?'#A2D2FF':'#9E7E6B'};">
                    <div><b>${r.category}</b> <small>${r.date}</small></div>
                    <b style="color:${r.type==='save'?'#77b5fe':'#9E7E6B'}">${r.type==='save'?'+':'-'}${r.amount.toLocaleString()}</b>
                </div>
            `).join('');
            
            renderDreams(total);
        }

        function renderDreams(total) {
            document.getElementById('dreamContainer').innerHTML = dreams.map((d, index) => {
                let percent = Math.min((total / d.target) * 100, 100).toFixed(1);
                let isDone = percent >= 100;
                return `
                <div class="dream-card" onclick="openDreamManage(${index}, ${total})">
                    ${isDone ? '<div class="milestone-tag">MILESTONE 達成!</div>' : ''}
                    <b>${d.name}</b> <small>目標 $${d.target.toLocaleString()}</small>
                    <div style="background:#eee; height:12px; border-radius:6px; margin:10px 0;">
                        <div style="background:${isDone?'var(--success)':'var(--primary-blue)'}; height:100%; width:${percent}%; border-radius:6px; transition:1s;"></div>
                    </div>
                    <div style="font-size:12px; color:#999; text-align:right;">達成度 ${percent}%</div>
                </div>`;
            }).join('');

            document.getElementById('achievedContainer').innerHTML = achieved.map(a => `
                <div class="achieved-item">🏆 已實現：${a.name} ($${a.target.toLocaleString()})</div>
            `).join('') || '<div style="color:#ccc; font-size:12px;">尚無實現的里程碑</div>';
        }

        function openDreamManage(index, currentTotal) {
            const d = dreams[index];
            document.getElementById('manageDreamTitle').innerText = d.name;
            document.getElementById('manageDreamText').innerText = `目標金額：$${d.target.toLocaleString()}`;
            
            const finishBtn = document.getElementById('finishDreamBtn');
            if (currentTotal >= d.target) {
                finishBtn.style.display = 'block';
                finishBtn.onclick = async () => {
                    achieved.push(d);
                    localStorage.setItem('kobiAchieved', JSON.stringify(achieved));
                    // 扣除基金邏輯：新增一筆負值紀錄到雲端
                    await addRecordToCloud({
                        amount: d.target, date: new Date().toISOString().split('T')[0],
                        timestamp: new Date().getTime(), type: 'spend', category: '實現夢想', note: `完成夢想：${d.name}`
                    });
                    dreams.splice(index, 1);
                    saveDreams();
                    closeModal('dreamManageModal');
                };
            } else { finishBtn.style.display = 'none'; }

            document.getElementById('deleteDreamBtn').onclick = () => {
                dreams.splice(index, 1);
                saveDreams();
                closeModal('dreamManageModal');
                updateUI();
            };
            openModal('dreamManageManageModal');
            document.getElementById('dreamManageModal').style.display = 'flex';
        }

        async function confirmDelete(id) {
            if(confirm("確定刪除這筆雲端紀錄？")) {
                await window.fs.deleteDoc(window.fs.doc(window.db, "records", id));
                fetchRecordsFromCloud();
            }
        }

        function saveDreams() { localStorage.setItem('kobiDreams', JSON.stringify(dreams)); updateUI(); }
        function openModal(id) { 
            document.getElementById(id).style.display = 'flex'; 
            if(id==='recordModal') {
                document.getElementById('recordDate').valueAsDate = new Date();
                updateCategories(); // 自動加載預設類別
            }
        }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function updateCategories() {
            const type = document.getElementById('recordType').value;
            document.getElementById('recordCategory').innerHTML = categories[type].map(c => `<option value="${c}">${c}</option>`).join('');
        }
        function addDream() {
            const name = document.getElementById('dreamName').value;
            const target = parseFloat(document.getElementById('dreamTarget').value);
            if (name && target) { dreams.push({ name, target }); saveDreams(); closeModal('dreamModal'); }
        }
        function quickFortune() {
            const f = fortunes[Math.floor(Math.random() * fortunes.length)];
            document.getElementById('fortunePageText').innerText = f;
        }
    </script>
</body>
</html>
