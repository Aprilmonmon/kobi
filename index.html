<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摳比 KOBI - 你的夢想存錢小管家</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #FAF9F6; /* 奶油白 */
            --primary-blue: #A2D2FF; /* 粉藍 */
            --line-brown: #9E7E6B; /* 淺咖線條 */
            --text-color: #6D5B4F;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        /* 摳比大頭容器 */
        .kobi-container {
            width: 200px;
            height: 200px;
            background: #fff;
            border: 4px solid var(--line-brown);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
            box-shadow: 0 10px 0px var(--primary-blue);
            overflow: hidden;
        }

        .kobi-container img {
            width: 80%;
            height: auto;
        }

        .balance-card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            border: 2px solid var(--line-brown);
            text-align: center;
            width: 90%;
            max-width: 350px;
            margin-bottom: 20px;
        }

        .balance-amount {
            font-size: 32px;
            font-weight: bold;
            color: var(--primary-blue);
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 90%;
            max-width: 350px;
        }

        button {
            padding: 15px;
            border-radius: 15px;
            border: 2px solid var(--line-brown);
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-save { background-color: var(--primary-blue); color: white; }
        .btn-spend { background-color: white; color: var(--line-brown); }

        canvas {
            margin-top: 30px;
            max-width: 300px;
        }
    </style>
</head>
<body>

    <div class="kobi-container">
        <img src="https://aprilmonmon.github.io/kobi/kobi-logo.png" alt="KOBI">
    </div>

    <div class="balance-card">
        <div>目前摳比幫你存了</div>
        <div class="balance-amount" id="totalBalance">$0</div>
    </div>

    <div class="btn-group">
        <button class="btn-save" onclick="updateMoney('save')">存摳摳</button>
        <button class="btn-spend" onclick="updateMoney('spend')">花摳摳</button>
    </div>

    <canvas id="myChart"></canvas>

    <script>
        // 資料初始化：從手機本地儲存讀取
        let data = JSON.parse(localStorage.getItem('kobiData')) || { save: 0, spend: 0 };

        function updateUI() {
            document.getElementById('totalBalance').innerText = `$${data.save - data.spend}`;
            renderChart();
            localStorage.setItem('kobiData', JSON.stringify(data));
        }
<body>
    <div id="customModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:white; padding:30px; border-radius:25px; border:3px solid #9E7E6B; width:80%; max-width:300px; text-align:center; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
            <h3 id="modalTitle" style="color:#6D5B4F; margin-top:0;">今天要餵多少錢？</h3>
            <input type="number" id="modalInput" style="width:100%; padding:12px; font-size:20px; border-radius:10px; border:2px solid #A2D2FF; margin-bottom:20px; outline:none; box-sizing: border-box;" placeholder="請輸入金額">
            <div style="display:flex; gap:10px;">
                <button onclick="closeModal()" style="flex:1; background:#eee; border:none; padding:10px; border-radius:10px; cursor:pointer;">取消</button>
                <button onclick="confirmMoney()" style="flex:1; background:#A2D2FF; color:white; border:none; padding:10px; border-radius:10px; font-weight:bold; cursor:pointer;">確定</button>
            </div>
        </div>
    </div>
    
    ```

---

### 2. JavaScript 部分：取代原本的 `updateMoney` 函數
在 `<script>` 標籤中，找到原本的 `function updateMoney(type) { ... }`，並用這段新的邏輯將其**完整取代**：

```javascript
    // 2. 取代原本的 updateMoney 函數，並加入控制對話框的邏輯
    let currentAction = ''; 

    function updateMoney(type) {
        currentAction = type;
        // 根據存或花，動態改變對話框標題
        document.getElementById('modalTitle').innerText = (type === 'save' ? "今天要餵摳比多少錢？" : "摳比幫你搬走了多少錢？");
        document.getElementById('modalInput').value = ''; // 清空輸入框
        document.getElementById('customModal').style.display = 'flex'; // 顯示對話框
        document.getElementById('modalInput').focus(); // 自動聚焦輸入框
    }

    function closeModal() {
        document.getElementById('customModal').style.display = 'none'; // 隱藏對話框
    }

    function confirmMoney() {
        let amount = document.getElementById('modalInput').value;
        if (amount && !isNaN(amount)) {
            data[currentAction] += parseInt(amount); // 更新資料
            updateUI(); // 重新渲染畫面與圓餅圖
            closeModal(); // 關閉對話框
        }
    }

        // 圓餅圖渲染
        let myChart;
        function renderChart() {
            const ctx = document.getElementById('myChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['存起來', '花掉的'],
                    datasets: [{
                        data: [data.save, data.spend],
                        backgroundColor: ['#A2D2FF', '#9E7E6B'],
                        borderWidth: 0
                    }]
                },
                options: { cutout: '70%' }
            });
        }

        updateUI();
    </script>
</body>
</html>
