<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摳比 KOBI - 雲端夢想金庫</title>
    
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCP0ytf38A-qz0ocTZVX2IgJNfrHscDC-4",
        authDomain: "kobi-dream-vault.firebaseapp.com",
        projectId: "kobi-dream-vault",
        storageBucket: "kobi-dream-vault.firebasestorage.app",
        messagingSenderId: "959095807484",
        appId: "1:959095807484:web:16ea95cb313e3f0f036679",
        measurementId: "G-D1WRCDRB1F"
      };

      const app = initializeApp(firebaseConfig);
      window.db = getFirestore(app);
      // 將常用的 Firestore 方法掛載到 window，方便下方 Script 呼叫
      window.fs = { collection, addDoc, getDocs, query, orderBy, limit };
      console.log("🐹 摳比：雲端金庫連線成功！");
      
      // 頁面加載完成後自動抓取雲端資料
      window.onload = () => {
          fetchRecordsFromCloud();
          liff.init({ liffId: "2010068096-vsSIzIqA" }).catch(e => console.log(e));
      };
    </script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg-color: #FAF9F6; --primary-blue: #A2D2FF; --line-brown: #9E7E6B; --text-color: #6D5B4F; }
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .tab-group { display: flex; width: 100%; background: white; border-bottom: 2px solid var(--line-brown); position: sticky; top: 0; z-index: 1000; }
        .tab-btn { flex: 1; padding: 18px 10px; text-align: center; font-weight: bold; cursor: pointer; color: #ccc; transition: 0.3s; }
        .tab-btn.active { color: var(--line-brown); border-bottom: 4px solid var(--line-brown); }
        .page { display: none; width: 90%; max-width: 350px; padding: 20px 0; flex-direction: column; align-items: center; }
        .page.active { display: flex !important; }
        .kobi-container { width: 120px; height: 120px; background: #fff; border: 4px solid var(--line-brown); border-radius: 50%; display: flex; justify-content: center; align-items: center; margin-bottom: 15px; box-shadow: 0 6px 0px var(--primary-blue); cursor: pointer; }
        .balance-card { background: white; padding: 15px; border-radius: 20px; border: 2px solid var(--line-brown); text-align: center; width: 100%; box-sizing: border-box; margin-bottom: 15px; }
        .history-item { background: white; padding: 12px 15px; border-radius: 12px; margin-bottom: 8px; width: 100%; box-sizing: border-box; border-left: 5px solid var(--primary-blue); display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.65); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 30px; width: 85%; max-width: 320px; text-align: center; }
        .btn-main { width: 100%; padding: 14px; background: var(--primary-blue); color: white; border-radius: 14px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
    </style>
</head>
<body>

    <div class="tab-group">
        <div id="tab-record" class="tab-btn active" onclick="switchPage('recordPage')">摳比記帳</div>
        <div id="tab-dream" class="tab-btn" onclick="switchPage('dreamPage')">夢想福利社</div>
    </div>

    <div id="recordPage" class="page active">
        <div class="kobi-container" onclick="showFortune()">
            <img src="kobi-logo.png" alt="KOBI" style="width:85%;">
        </div>
        <div class="balance-card">
            <div style="font-size:14px; color:#999;">目前金庫餘額</div>
            <div id="mainBalance" style="font-size:32px; font-weight:bold; color:var(--primary-blue);">$0</div>
        </div>
        <button onclick="openModal('recordModal')" class="btn-main">＋ 新增一筆紀錄</button>
        <div id="listItems" style="width:100%; margin-top:20px;">正在同步雲端資料...</div>
    </div>

    <div id="dreamPage" class="page">
        <div class="balance-card" style="background: var(--primary-blue); color: white; border:none;">
            <div style="font-size:14px; opacity:0.8;">目前累積夢想基金</div>
            <div id="dreamFundTotal" style="font-size:28px; font-weight:bold;">$0</div>
        </div>
        <div style="width:100%; display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <b style="font-size:18px;">☁️ 我的夢想清單</b>
            <button onclick="openModal('dreamModal')" style="background:var(--line-brown); color:white; border:none; padding:8px 12px; border-radius:10px; font-size:12px;">+ 新目標</button>
        </div>
        <div id="dreamContainer" style="width:100%;"></div>
    </div>

    <!-- Modals -->
    <div id="recordModal" class="modal"><div class="modal-content">
        <h3>💰 新增紀錄</h3>
        <input type="date" id="recordDate">
        <select id="recordType" onchange="updateCategories()">
            <option value="spend">支出 / 購買</option>
            <option value="save">收入 / 存錢</option>
        </select>
        <select id="recordCategory"></select>
        <input type="number" id="recordAmount" placeholder="金額">
        <textarea id="recordNote" placeholder="備註一下..." rows="2"></textarea>
        <button onclick="addRecordToCloud()" class="btn-main">存入雲端金庫</button>
        <button onclick="closeModal('recordModal')" style="background:none; border:none; color:#999; margin-top:10px;">取消</button>
    </div></div>

    <div id="dreamModal" class="modal"><div class="modal-content">
        <h3>✨ 設定新夢想</h3>
        <input type="text" id="dreamName" placeholder="夢想名稱">
        <input type="number" id="dreamTarget" placeholder="目標金額">
        <button onclick="addDream()" class="btn-main">開始計畫</button>
        <button onclick="closeModal('dreamModal')" style="background:none; border:none; color:#999; margin-top:10px;">取消</button>
    </div></div>

    <div id="fortuneModal" class="modal"><div class="modal-content">
        <div style="font-size:40px;">🐹</div>
        <div style="color:var(--primary-blue); font-weight:bold;">摳比今日開示</div>
        <div id="fortuneText" style="line-height:1.7; margin:15px 0; white-space:pre-line;"></div>
        <button onclick="closeModal('fortuneModal')" class="btn-main">好喔！</button>
    </div></div>

    <script>
        const fortunes = ["財神爺今天住你家！☕\n🌈 幸運色：暖陽黃", "今日財運爆棚。✨\n🌈 幸運色：優雅正米色", "摳比永遠支持你！🐹\n🌈 幸運色：摳比藍", "省下飲料錢，未來感謝你。🥤\n🌈 幸運色：湖水綠"];
        let records = [];
        let dreams = JSON.parse(localStorage.getItem('kobiDreams') || '[]');
        let categories = { save: ["薪水", "獎金", "投資", "其他"], spend: ["吃喝費", "治裝費", "交通費", "其他"] };

        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.getElementById('tab-' + (pageId === 'recordPage' ? 'record' : 'dream')).classList.add('active');
        }

        async function fetchRecordsFromCloud() {
            try {
                const q = window.fs.query(window.fs.collection(window.db, "records"), window.fs.orderBy("timestamp", "desc"), window.fs.limit(50));
                const querySnapshot = await window.fs.getDocs(q);
                records = [];
                querySnapshot.forEach((doc) => { records.push(doc.data()); });
                updateUI();
            } catch (e) {
                console.error("抓取失敗", e);
                document.getElementById('listItems').innerText = "連線失敗，請檢查網路";
            }
        }

        async function addRecordToCloud() {
            const amount = parseFloat(document.getElementById('recordAmount').value);
            const date = document.getElementById('recordDate').value;
            if (!amount || !date) return alert("請輸入金額與日期");

            const newRecord = {
                amount, date,
                type: document.getElementById('recordType').value,
                category: document.getElementById('recordCategory').value,
                note: document.getElementById('recordNote').value,
                timestamp: new Date().getTime()
            };

            try {
                await window.fs.addDoc(window.fs.collection(window.db, "records"), newRecord);
                records.unshift(newRecord);
                closeModal('recordModal');
                updateUI();
                alert("🐹 摳比：存好了！資料已同步雲端。");
            } catch (e) { alert("同步失敗"); }
        }

        function updateUI() {
            const total = records.reduce((acc, r) => r.type === 'save' ? acc + r.amount : acc - r.amount, 0);
            document.getElementById('mainBalance').innerText = `$${total.toLocaleString()}`;
            document.getElementById('dreamFundTotal').innerText = `$${total.toLocaleString()}`;
            
            const list = document.getElementById('listItems');
            list.innerHTML = records.map(r => `
                <div class="history-item" style="border-left-color: ${r.type==='save'?'#A2D2FF':'#9E7E6B'};">
                    <div><b>${r.category}</b> <small>${r.date}</small></div>
                    <b style="color:${r.type==='save'?'#77b5fe':'#9E7E6B'}">${r.type==='save'?'+':'-'}${r.amount.toLocaleString()}</b>
                </div>
            `).join('') || '<div style="color:#ccc; text-align:center;">尚無紀錄</div>';
            
            updateDreamList(total);
        }

        function updateDreamList(fund) {
            const dc = document.getElementById('dreamContainer');
            dc.innerHTML = dreams.map(d => {
                let percent = Math.min((fund / d.target) * 100, 100).toFixed(1);
                return `<div class="dream-card" style="background:white; padding:15px; border-radius:15px; border:1px solid #ddd; margin-bottom:10px;">
                    <b>${d.name}</b> ($${d.target.toLocaleString()})
                    <div style="background:#eee; height:10px; border-radius:5px; margin:10px 0;"><div style="background:var(--primary-blue); height:100%; width:${percent}%; border-radius:5px;"></div></div>
                    <div style="font-size:12px; color:#999; text-align:right;">達成度 ${percent}%</div>
                </div>`;
            }).join('');
        }

        function showFortune() {
            document.getElementById('fortuneText').innerText = fortunes[Math.floor(Math.random() * fortunes.length)];
            openModal('fortuneModal');
        }

        function openModal(id) { 
            document.getElementById(id).style.display = 'flex'; 
            if(id==='recordModal'){ document.getElementById('recordDate').valueAsDate=new Date(); updateCategories(); }
        }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function updateCategories() {
            const type = document.getElementById('recordType').value;
            document.getElementById('recordCategory').innerHTML = categories[type].map(c => `<option value="${c}">${c}</option>`).join('');
        }
    </script>
</body>
</html>
