<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摳比 KOBI - 夢想金庫</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg-color: #FAF9F6; --primary-blue: #A2D2FF; --line-brown: #9E7E6B; --text-color: #6D5B4F; }
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .tab-group { display: flex; width: 100%; background: white; border-bottom: 2px solid var(--line-brown); position: sticky; top: 0; z-index: 1000; }
        .tab-btn { flex: 1; padding: 18px 10px; text-align: center; font-weight: bold; cursor: pointer; color: #ccc; }
        .tab-btn.active { color: var(--line-brown); border-bottom: 4px solid var(--line-brown); }
        .page { display: none; width: 90%; max-width: 350px; padding: 20px 0; flex-direction: column; align-items: center; }
        .page.active { display: flex !important; }
        .kobi-container { width: 120px; height: 120px; background: #fff; border: 4px solid var(--line-brown); border-radius: 50%; display: flex; justify-content: center; align-items: center; margin-bottom: 15px; box-shadow: 0 6px 0px var(--primary-blue); cursor: pointer; }
        .balance-card { background: white; padding: 15px; border-radius: 20px; border: 2px solid var(--line-brown); text-align: center; width: 100%; box-sizing: border-box; margin-bottom: 20px; }
        .history-item { background: white; padding: 10px 15px; border-radius: 12px; margin-bottom: 8px; width: 100%; box-sizing: border-box; border-left: 5px solid var(--primary-blue); display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .dream-card { background: white; border-radius: 15px; padding: 15px; width: 100%; border: 1px solid #ddd; margin-bottom: 12px; box-sizing: border-box; }
        .progress-bar { background: #eee; height: 14px; border-radius: 7px; margin: 12px 0; overflow: hidden; }
        .progress-fill { background: var(--primary-blue); height: 100%; width: 0%; transition: 0.8s; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.65); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 30px; width: 85%; max-width: 320px; text-align: center; max-height: 80vh; overflow-y: auto; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; font-family: inherit; }
        .btn-main { width: 100%; padding: 14px; background: var(--primary-blue); color: white; border-radius: 14px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .switch-container { display: flex; align-items: center; justify-content: space-between; margin: 10px 0; font-size: 14px; }
    </style>
</head>
<body>

    <div class="tab-group">
        <div id="btn-record" class="tab-btn active" onclick="switchPage('recordPage', this)">摳比記帳</div>
        <div id="btn-dream" class="tab-btn" onclick="switchPage('dreamPage', this)">夢想福利社</div>
    </div>

    <!-- 記帳分頁 -->
    <div id="recordPage" class="page active">
        <div class="kobi-container" onclick="showFortune()">
            <img src="kobi-logo.png" alt="KOBI" style="width:85%;">
        </div>
        <div class="balance-card">
            <div style="font-size:14px; color:#999;">本月結算餘額</div>
            <div id="mainBalance" style="font-size:32px; font-weight:bold; color:var(--primary-blue);">$0</div>
        </div>
        <button onclick="openModal('recordModal')" class="btn-main">＋ 新增一筆收支</button>
        
        <div id="historyList" style="width:100%; margin-top:20px;">
            <b style="font-size:14px; color:var(--line-brown);">最近紀錄 (點擊可刪除)</b>
            <div id="listItems" style="margin-top:10px;"></div>
        </div>
    </div>

    <!-- 夢想分頁 -->
    <div id="dreamPage" class="page">
        <div class="balance-card" style="background: var(--primary-blue); color: white; border:none;">
            <div style="font-size:14px; opacity:0.8;">目前夢想基金</div>
            <div id="dreamFundTotal" style="font-size:28px; font-weight:bold;">$0</div>
        </div>
        <div style="width:100%; display:flex; justify-content:space-between; align-items:center; margin:15px 0;">
            <b style="font-size:18px;">☁️ 我的夢想清單</b>
            <button onclick="openModal('dreamModal')" style="background:var(--line-brown); color:white; border:none; padding:8px 15px; border-radius:10px; font-size:12px;">+ 新目標</button>
        </div>
        <div id="dreamContainer" style="width:100%;"></div>
        
        <hr style="width:100%; border:0.5px solid #eee; margin: 25px 0;">
        <b style="width:100%; text-align:left; margin-bottom:10px;">🐹 摳比福利社 (蝦皮分潤專區)</b>
        <div id="recommendContainer" style="width:100%; color:#ccc; text-align:center; padding:20px; border:1px dashed #ddd; border-radius:15px;">
            清單準備中，敬請期待...
        </div>
    </div>

    <!-- 記帳彈窗 -->
    <div id="recordModal" class="modal"><div class="modal-content">
        <h3 id="modalTitle">💰 新增收支</h3>
        <input type="date" id="recordDate">
        <select id="recordType" onchange="updateCategories()">
            <option value="spend">支出 / 購買</option>
            <option value="save">收入 / 存錢</option>
        </select>
        <select id="recordCategory"></select>
        <input type="number" id="recordAmount" placeholder="金額">
        <textarea id="recordNote" placeholder="備注一下吧..." rows="2"></textarea>
        
        <div class="switch-container">
            <span>放入夢想基金？</span>
            <input type="checkbox" id="toDreamFund" style="width:auto;">
        </div>

        <button onclick="addRecord()" class="btn-main">確認存入</button>
        <button onclick="closeModal('recordModal')" style="background:none; border:none; color:#999; margin-top:10px;">取消</button>
    </div></div>

    <!-- 夢想彈窗 -->
    <div id="dreamModal" class="modal"><div class="modal-content">
        <h3>✨ 設定新夢想</h3>
        <input type="text" id="dreamName" placeholder="夢想名稱 (例：去日本玩)">
        <input type="number" id="dreamTarget" placeholder="需要多少夢想基金？">
        <button onclick="addDream()" class="btn-main">開始存錢</button>
        <button onclick="closeModal('dreamModal')" style="background:none; border:none; color:#999; margin-top:10px;">取消</button>
    </div></div>

    <!-- 運勢彈窗 -->
    <div id="fortuneModal" class="modal"><div class="modal-content">
        <div style="font-size:40px; margin-bottom:10px;">🐹</div>
        <div style="color:var(--primary-blue); font-weight:bold;">摳比今日開示</div>
        <div id="fortuneText" style="line-height:1.7; margin:15px 0; white-space:pre-line; font-size:15px;"></div>
        <button onclick="closeModal('fortuneModal')" class="btn-main">好喔！</button>
    </div></div>

    <script>
        // 1. 保險讀取機制
        function loadData(key) {
            try {
                let saved = localStorage.getItem(key);
                return saved ? JSON.parse(saved) : [];
            } catch (e) { return []; }
        }

        let categories = {
            save: ["薪水", "投資高手", "發獎金啦", "摳比私房錢", "其他"],
            spend: ["吃喝費", "治裝費", "交通費", "網路手機費", "玩耍費用", "金融保險", "學習上進", "醫療費用", "其他"]
        };

        let records = loadData('kobiRecords');
        let dreams = loadData('kobiDreams');
        let chart;

        const kobiFortunes = [
            "財神爺今天住你家！☕\n🌈 幸運色：暖陽黃", "今日財運爆棚。✨\n🌈 幸運色：優雅正米色", "摳比永遠支持你！🐹\n🌈 幸運色：摳比藍", "省下飲料錢，未來感謝你。🥤\n🌈 幸運色：湖水綠", "理財是為了自由。🕊️\n🌈 幸運色：純淨白", "夢想金庫長大中！📈\n🌈 幸運色：玫瑰金", "錢變成了喜歡的樣子。🛍️\n🌈 幸運色：櫻桃紅", "控制物欲控制人生。🎮\n🌈 幸運色：經典黑", "你是省錢高手！👏\n🌈 幸運色：珊瑚橘", "記帳的你特別帥美。😎\n🌈 幸運色：耀眼紅", "絕對可以存到夢想金！🏆\n🌈 幸運色：冠軍金"
            // ... (此處可補足至 50 則)
        ];

        function updateCategories() {
            const type = document.getElementById('recordType').value;
            const catSelect = document.getElementById('recordCategory');
            catSelect.innerHTML = categories[type].map(c => `<option value="${c}">${c}</option>`).join('');
        }

        function addRecord() {
            const date = document.getElementById('recordDate').value;
            const type = document.getElementById('recordType').value;
            const category = document.getElementById('recordCategory').value;
            const amount = parseInt(document.getElementById('recordAmount').value);
            const note = document.getElementById('recordNote').value;
            const isDream = document.getElementById('toDreamFund').checked;

            if (date && amount) {
                records.push({ id: Date.now(), date, type, category, amount, note, isDream });
                localStorage.setItem('kobiRecords', JSON.stringify(records));
                closeModal('recordModal');
                updateUI();
            }
        }

        function deleteRecord(id) {
            if(confirm('確定要刪除這筆紀錄嗎？')) {
                records = records.filter(r => r.id !== id);
                localStorage.setItem('kobiRecords', JSON.stringify(records));
                updateUI();
            }
        }

        function updateUI() {
            const total = records.reduce((acc, r) => r.type === 'save' ? acc + r.amount : acc - r.amount, 0);
            const dreamTotal = records.filter(r => r.isDream).reduce((acc, r) => r.type === 'save' ? acc + r.amount : acc - r.amount, 0);
            
            document.getElementById('mainBalance').innerText = `$${total.toLocaleString()}`;
            document.getElementById('dreamFundTotal').innerText = `$${dreamTotal.toLocaleString()}`;
            
            // 渲染清單
            const listItems = document.getElementById('listItems');
            listItems.innerHTML = records.slice(-5).reverse().map(r => `
                <div class="history-item" onclick="deleteRecord(${r.id})" style="border-left-color: ${r.type==='save'?'#A2D2FF':'#9E7E6B'}">
                    <div><b>${r.category}</b> <small>${r.date}</small><br><span style="font-size:12px; color:#999;">${r.note || ''}</span></div>
                    <b style="color:${r.type==='save'?'#77b5fe':'#9E7E6B'}">${r.type==='save'?'+':'-'}${r.amount}</b>
                </div>
            `).join('');

            renderDreams(dreamTotal);
        }

        function addDream() {
            const name = document.getElementById('dreamName').value;
            const target = parseInt(document.getElementById('dreamTarget').value);
            if (name && target) {
                dreams.push({ name, target });
                localStorage.setItem('kobiDreams', JSON.stringify(dreams));
                closeModal('dreamModal');
                updateUI();
            }
        }

        function renderDreams(fund) {
            const container = document.getElementById('dreamContainer');
            container.innerHTML = dreams.length ? '' : '<div style="color:#ccc; text-align:center; padding:20px;">新增你的第一個夢想吧！</div>';
            dreams.forEach(d => {
                const percent = Math.min(Math.floor((fund / d.target) * 100), 100);
                container.innerHTML += `<div class="dream-card"><b>${d.name}</b> ($${d.target.toLocaleString()})<div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div><div style="font-size:12px; color:#999; text-align:right;">夢想基金達成度 ${percent}%</div></div>`;
            });
        }

        function switchPage(pageId, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            btn.classList.add('active');
            updateUI();
        }

        function showFortune() {
            const idx = Math.floor(Math.random() * kobiFortunes.length);
            document.getElementById('fortuneText').innerText = kobiFortunes[idx];
            document.getElementById('fortuneModal').style.display = 'flex';
        }

        function openModal(id) { 
            document.getElementById(id).style.display = 'flex';
            if(id === 'recordModal') {
                document.getElementById('recordDate').valueAsDate = new Date();
                updateCategories();
            }
        }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            if (params.get('dream') === '1') switchPage('dreamPage', document.getElementById('btn-dream'));
            else if (params.get('draw') === '1') setTimeout(() => showFortune(), 500);
            updateUI();
        };
    </script>
</body>
</html>
