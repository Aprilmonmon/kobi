<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摳比 KOBI - 夢想金庫</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg-color: #FAF9F6; --primary-blue: #A2D2FF; --line-brown: #9E7E6B; --text-color: #6D5B4F; }
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* 頁籤切換 */
        .tab-group { display: flex; width: 100%; background: white; border-bottom: 2px solid var(--line-brown); position: sticky; top: 0; z-index: 100; }
        .tab-btn { flex: 1; padding: 15px; text-align: center; font-weight: bold; cursor: pointer; border: none; background: none; color: #ccc; }
        .tab-btn.active { color: var(--line-brown); border-bottom: 4px solid var(--line-brown); }

        .page { display: none; width: 90%; max-width: 350px; padding: 20px 0; flex-direction: column; align-items: center; }
        .page.active { display: flex; }

        /* 原有樣式 */
        .kobi-container { width: 120px; height: 120px; background: #fff; border: 4px solid var(--line-brown); border-radius: 50%; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; box-shadow: 0 6px 0px var(--primary-blue); }
        .kobi-container img { width: 80%; }
        .balance-card { background: white; padding: 15px; border-radius: 20px; border: 2px solid var(--line-brown); text-align: center; width: 100%; margin-bottom: 15px; }
        .balance-amount { font-size: 28px; font-weight: bold; color: var(--primary-blue); }
        
        /* 夢想卡片 */
        .dream-card { background: white; border-radius: 15px; padding: 15px; width: 100%; border: 1px solid #ddd; margin-bottom: 12px; box-sizing: border-box; }
        .progress-bar { background: #eee; height: 12px; border-radius: 6px; margin: 10px 0; overflow: hidden; }
        .progress-fill { background: var(--primary-blue); height: 100%; transition: 0.5s; }
        .reward-link { display: none; color: var(--primary-blue); font-size: 13px; font-weight: bold; text-decoration: none; margin-top: 5px; }

        /* 彈窗 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 30px; width: 85%; max-width: 320px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; }
        .btn-main { width: 100%; padding: 12px; border-radius: 12px; border: none; background: var(--primary-blue); color: white; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="tab-group">
        <div class="tab-btn active" onclick="switchPage('recordPage', this)">樞比記帳</div>
        <div class="tab-btn" onclick="switchPage('dreamPage', this)">夢想福利社</div>
    </div>

    <!-- 頁面一：記帳與籤詩 -->
    <div id="recordPage" class="page active">
        <div class="kobi-container" onclick="showFortune()">
            <img src="kobi-logo.png">
        </div>
        <div class="balance-card">
            <div style="font-size:14px; color:#999;">目前可分配餘額</div>
            <div class="balance-amount" id="mainBalance">$0</div>
        </div>
        <div style="display: flex; gap: 10px; width: 100%;">
            <button onclick="openRecordModal('save')" style="flex:1; padding:12px; background:var(--primary-blue); color:white; border-radius:12px; border:none;">收入</button>
            <button onclick="openRecordModal('spend')" style="flex:1; padding:12px; background:white; border:2px solid var(--line-brown); border-radius:12px;">支出</button>
        </div>
        <canvas id="myChart" style="margin-top:20px;"></canvas>
    </div>

    <!-- 頁面二：夢想牆與福利社 -->
    <div id="dreamPage" class="page">
        <div style="width:100%; display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <b style="font-size:18px;">☁️ 夢想清單</b>
            <button onclick="document.getElementById('dreamModal').style.display='flex'" style="background:var(--line-brown); color:white; border:none; padding:5px 10px; border-radius:8px; font-size:12px;">+ 新增目標</button>
        </div>
        <div id="dreamContainer" style="width:100%;"></div>
        
        <hr style="width:100%; border:0; border-top:1px solid #ddd; margin:20px 0;">
        <b style="font-size:18px; width:100%; text-align:left;">🎁 犒賞福利社</b>
        <div style="font-size:12px; color:#999; margin-bottom:10px; width:100%;">達標後即可解鎖專屬優惠！</div>
        <div id="shopList" style="width:100%;">
            <div class="dream-card" style="border-style: dashed;">
                <b>Gorpcore 機能登山鞋</b>
                <div style="font-size:12px; color:#999;">目標金額: $4,500</div>
                <a href="https://www.merrell.com.tw/" class="reward-link" id="reward-登山鞋">👉 點我前往犒賞自己</a>
            </div>
        </div>
    </div>

    <!-- 記帳彈窗 -->
    <div id="recordModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">新增紀錄</h3>
            <input type="number" id="amountInput" placeholder="輸入金額" inputmode="numeric">
            <button class="btn-main" onclick="addRecord()">確認</button>
            <button onclick="closeModal('recordModal')" style="width:100%; background:none; border:none; margin-top:10px; color:#999;">取消</button>
        </div>
    </div>

    <!-- 夢想彈窗 -->
    <div id="dreamModal" class="modal">
        <div class="modal-content">
            <h3>設定夢想目標</h3>
            <input type="text" id="dreamName" placeholder="想買什麼？">
            <input type="number" id="dreamTarget" placeholder="金額 (例如: 12800000)">
            <button class="btn-main" onclick="addDream()">開始存錢！</button>
            <button onclick="closeModal('dreamModal')" style="width:100%; background:none; border:none; margin-top:10px; color:#999;">取消</button>
        </div>
    </div>

    <!-- 籤詩彈窗 -->
    <div id="fortuneModal" class="modal">
        <div class="modal-content">
            <div style="color:var(--primary-blue); font-weight:bold; margin-bottom:10px;">🌟 摳比開示 🌟</div>
            <div id="fortuneText" style="line-height:1.6; margin-bottom:15px; white-space:pre-line;"></div>
            <button onclick="closeModal('fortuneModal')" style="width:100%; background:var(--primary-blue); color:white; border:none; border-radius:15px; padding:10px;">收下好運</button>
        </div>
    </div>

    <script>
        let records = JSON.parse(localStorage.getItem('kobiRecords') || '[]');
        let dreams = JSON.parse(localStorage.getItem('kobiDreams') || '[]');
        let currentRecordType = 'save';

        function switchPage(pageId, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            btn.classList.add('active');
            if(pageId === 'dreamPage') renderDreams();
        }

        function openRecordModal(type) {
            currentRecordType = type;
            document.getElementById('modalTitle').innerText = type === 'save' ? '新增收入' : '新增支出';
            document.getElementById('recordModal').style.display = 'flex';
        }

        function addRecord() {
            const amt = parseInt(document.getElementById('amountInput').value);
            if(!amt) return;
            records.push({ type: currentRecordType, amount: amt, date: new Date() });
            localStorage.setItem('kobiRecords', JSON.stringify(records));
            closeModal('recordModal');
            updateBalance();
        }

        function addDream() {
            const name = document.getElementById('dreamName').value;
            const target = parseInt(document.getElementById('dreamTarget').value);
            if(!name || !target) return;
            dreams.push({ name, target });
            localStorage.setItem('kobiDreams', JSON.stringify(dreams));
            closeModal('dreamModal');
            renderDreams();
        }

        function updateBalance() {
            const total = records.reduce((acc, r) => r.type === 'save' ? acc + r.amount : acc - r.amount, 0);
            document.getElementById('mainBalance').innerText = `$${total.toLocaleString()}`;
            renderChart();
            return total;
        }

        function renderDreams() {
            const total = updateBalance();
            const container = document.getElementById('dreamContainer');
            container.innerHTML = '';
            dreams.forEach(d => {
                const percent = Math.min(Math.floor((total / d.target) * 100), 100);
                const isDone = percent >= 100;
                container.innerHTML += `
                    <div class="dream-card">
                        <b>${d.name}</b>
                        <div style="font-size:18px; margin:5px 0;">$${d.target.toLocaleString()}</div>
                        <div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div>
                        <div style="font-size:12px; color:#888;">${isDone ? '🎉 已達標！' : '還差 $' + (d.target - total).toLocaleString()}</div>
                    </div>
                `;
                // 如果達標，顯示福利社對應連結 (簡單邏輯判斷)
                if(isDone && document.getElementById('reward-' + d.name)) {
                    document.getElementById('reward-' + d.name).style.display = 'block';
                }
            });
        }

        function showFortune() {
            const f = ["今日宜犒賞自己，夢想就在不遠處！🌈", "存下的每一分錢，都是未來的自由。💰", "看到心儀的東西了嗎？把它加入夢想清單吧！✨"];
            document.getElementById('fortuneText').innerText = f[Math.floor(Math.random()*f.length)];
            document.getElementById('fortuneModal').style.display = 'flex';
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        let chart;
        function renderChart() {
            const s = records.filter(r => r.type === 'save').reduce((a, b) => a + b.amount, 0);
            const p = records.filter(r => r.type === 'spend').reduce((a, b) => a + b.amount, 0);
            const ctx = document.getElementById('myChart').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels:['收入','支出'], datasets:[{data:[s||1, p], backgroundColor:['#A2D2FF','#9E7E6B']}]},
                options: { cutout: '80%', plugins: { legend: { display: false } } }
            });
        }

        updateBalance();
    </script>
</body>
</html>
